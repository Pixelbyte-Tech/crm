     */
    optional int64 lastUpdateTimestamp = 5;
    /**
     * Price Stream Symbol
     */
    repeated Symbol priceStreamSymbol = 6;

    /**
     * Price stream symbol
     */
    message Symbol {
        /**
         * ID of the Price Stream Symbol
         */
