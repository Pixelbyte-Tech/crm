/**
 * Price snapshot
 */
message PriceSnapshot {
    /**
     * ID of the Price Snapshot
     */
    required int64 id = 1;
    /**
     * ID of the Symbol
     */
    optional int64 symbolId = 2;
    /**
     * Price details
     */
    repeated Entry priceSnapshotEntry = 3;

